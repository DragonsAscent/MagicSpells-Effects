<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicSpells Effects Library</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #252526;
      --panel-light: #2d2d30;
      --text: #d4d4d4;
      --muted: #9da1a6;
      --accent: #22c55e;
      --accent-strong: #16a34a;
      --border: #3a3d41;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: #181818;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
      color: #fff;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 91px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 1rem;
    }

    .sidebar h2 {
      margin-top: 0;
      font-size: 1rem;
      color: #fff;
    }

    .config-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }

    .config-button {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-light);
      color: var(--text);
      text-align: left;
      padding: 0.7rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.95rem;
    }

    .config-button:hover,
    .config-button.active {
      border-color: var(--accent);
      background: #1f3327;
    }

    main {
      padding: 1.2rem;
    }

    .config-card {
      display: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
    }

    .config-card.active {
      display: block;
    }

    .config-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: #1a1a1a;
    }

    .config-header h3 {
      margin: 0;
      color: #fff;
      font-size: 1.1rem;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }

    .panel {
      background: var(--panel-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem;
    }

    .panel h4 {
      margin: 0 0 0.6rem;
      color: #fff;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid #4a4f55;
      background: #111;
      color: #dcdcaa;
      padding: 0.75rem;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.88rem;
    }

    .preview {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #4a4f55;
      background: #111;
      display: block;
    }

    .notes {
      margin: 0;
      color: var(--text);
      line-height: 1.45;
      font-size: 0.93rem;
      white-space: pre-line;
    }

    .pager {
      display: flex;
      justify-content: space-between;
      gap: 0.7rem;
      padding: 0 1rem 1rem;
    }

    .pager button {
      border: 1px solid var(--accent);
      background: #1f3327;
      color: #d8ffe4;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      cursor: pointer;
    }

    .pager button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .discord {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      border: 0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <header>
    <h1>MagicSpells Effect Configurations</h1>
    <p class="subtitle">Browse multiple ready-to-use MagicSpells setups.</p>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Available Configurations</h2>
      <ul class="config-list" id="configList"></ul>
    </aside>

    <main>
      <section id="cards"></section>
    </main>
  </div>

  <a class="discord" href="https://discord.magicspells.dev" target="_blank" rel="noopener noreferrer">Discord Invite</a>

  <script>
    const configurations = [
      {
        name: "Text Display Wind",
        image: "assets/windy.gif",
        yaml: `Windy:
    spell-class: ".instant.ParticleProjectileSpell"
    relative-offset:
      x: rand(%arg:1:0%,%arg:2:4%)
      y: rand(%arg:1:0%,%arg:2:4%)
      z: rand(%arg:3:-3%,%arg:4:3%)
    projectile-velocity: 25
    tick-interval: 1
    special-effect-interval: 1
    max-duration: 4
    max-distance: 16
    hit-radius: 2
    vertical-hit-radius: 1
    ground-hit-radius: 0.2
    hit-air-during: false
    hit-ground: true
    hit-players: false
    hit-non-players: false
    hit-air-at-end: false
    spell: TDummy
    effects:
      - position: projectile
        effect: entity
        pitch: ~90
        drag-entity: true
        entity:
          entity: text_display
          duration: 1000
          interpolation-DELAY: 2
          background: 48ffffff
          interpolation-duration: 50
          teleport-duration: 2
          billboard: fixed
          brightness:
            sky: 8
            block: 8
          text: " "
          transformation:
            left-rotation: "1,0,0,0.021"
            right-rotation: "0,0,0,1"
            scale: "1,0,0"
            translation: "0,0,0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                interpolation-delay: 0
                interpolation-duration: 30
                teleport-duration: 2
                transformation:
                  left-rotation: "1,0,0,0.021"
                  right-rotation: "0,0,0,1"
                  scale: "1.5,7,0"
                  translation: "0,0,0"
      - position: projectile
        effect: entity
        pitch: ~90
        drag-entity: true
        entity:
          entity: text_display
          duration: 1000
          interpolation-DELAY: 2
          background: 48ffffff
          interpolation-duration: 50
          teleport-duration: 2
          billboard: fixed
          brightness:
            sky: 8
            block: 8
          text: " "
          transformation:
            left-rotation: "0,0,0,1"
            right-rotation: "0,0,0,1"
            scale: "0.5,0.5,0"
            translation: "0,0,0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                interpolation-delay: 0
                interpolation-duration: 30
                teleport-duration: 2
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0,0,1"
                  scale: "1.5,7,0"
                  translation: "0,0,0"`,
        notes: "A dynamic wind effect using text displays as particles.\nThe displays are transparent and one display is flipped due to text displays not rendering when looked at from behind. The particle projectile allows for wall collisions as well adding realism to the effect."
      },
      {
        name: "Iron Smash",
        image: "assets/iron_smash.gif",
        yaml: `# Version 1.2 // By DragonsAscent // https://discord.magicspells.dev/
iron_smash:
    spell-class: ".TargetedMultiSpell"
    name: "Iron Smash"
    spells:
      - iron_anvil
      - iron_crack(targeting=location;delay=21)
    str-cast-self: "<gray>You've casted the <red>Iron Smash</red> spell!"
    str-cast-others: "<gray>A massive <red>anvil</red> swirls into existence!"
    effects:
      - position: target
        effect: sound
        sound: entity.breeze.charge
        volume: 6
        pitch: 0.3
        offset: 0,5,0
      - position: target
        delay: 22
        effect: sound
        sound: block.trial_spawner.open_shutter
        volume: 10
        pitch: 0
      - position: target
        delay: 23
        effect: sound
        sound: entity.copper_golem_oxidized.death
        volume: 10
        pitch: 0
iron_crack:
    spell-class: ".targeted.NovaSpell"
    type: air
    radius: 6
    expand-interval: 3
    visible-range: 50
    circle-shape: true
    spell: crack_effect(targeting=location;chance=20)
crack_effect:
    spell-class: ".targeted.AreaEffectSpell"
    horizontal-radius: 1
    vertical-radius: 1
    fail-if-no-targets: false
    spell-source-in-center: true
    require-entity-target: false
    spells: [crack_pain]
    effects:
      - position: special
        offset: 0,-1,0
        effect: blockbreak
        stage: "rand(3,9)"
      - position: special
        effect: sound
        sound: entity.zombie.attack_wooden_door
        volume: 2
        pitch: "rand(0.75,1.25)"
      - position: special
        effect: particles
        particle-name: dust_plume
        horiz-spread: 0.05
        vert-spread: 0.1
        speed: 0.2
        force: true
        count: 16
crack_pain:
    spell-class: ".targeted.DamageSpell"
    damage: 5
    damage-type: FALLING_BLOCK
    str-cast-target: "<gray>The shockwave seems to have hit you</gray>"
iron_anvil:
    spell-class: ".targeted.DummySpell" 
    effects:
      - position: target
        effect: particles
        particle-name: flash
        delay: 120
      - position: target
        effect: sound
        sound: block.anvil.break
        delay: 120
        volume: 1
        pitch: 1
      - position: target
        effect: sound
        delay: 120
        sound: block.trial_spawner.spawn_item_begin
        volume: 2
        pitch: 1
      - position: target
        effect: entity
        pitch: 0
        entity:
          entity: item_display
          duration: 120
          scoreboard-tags: 
            - "%a_spell_effect"
          interpolation-delay: 2
          interpolation-duration: 50
          teleport-duration: 3
          item: anvil
          brightness:
            sky: 15
            block: 0
          transformation:
            left-rotation: "0,0,0,1"
            right-rotation: "0,0,0,1"
            scale: "0.5,0.5,0.5"
            translation: "0,10,0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                interpolation-delay: 0
                interpolation-duration: 7
                teleport-duration: 3
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,1,0,0"
                  translation: "0,8,0"
                  scale: "2.25,2.25,2.25"
            - delay: 9
              entity-data:
                interpolation-delay: 1
                interpolation-duration: 6
                teleport-duration: 3
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0.182,0.002,-0.983"
                  translation: "0,6,0"
                  scale: "2.25,2.25,2.25"
            - delay: 18
              entity-data:
                interpolation-delay: 0
                gravity: true
                interpolation-duration: 4
                teleport-duration: 3
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0.182,0.002,-0.983"
                  translation: "0,1.75,0"
                  scale: "2.25,2.25,2.25"`,
        notes: "Summon an anvil out of thin air which grows, spins, then slams down dealing damage to the ground"
      },
      {
        name: "Wind Siphon",
        image: "assets/wind_siphon.gif",
        yaml: `wind_siphon:
    spell-class: ".targeted.OrbitSpell"
    target-self: false
    hit-radius: 1
    start-angle-offset: rand(0,360)
    start-pitch-offset: rand(-30,30)
    vertical-hit-radius: 1
    seconds-per-revolution: 5
    follow-pitch: false
    horiz-expand-delay: 1
    follow-yaw: false
    orbit-radius: 12
    tick-interval: 1
    max-duration: 1
    y-offset: 0.75
    stop-on-hit-entity: true
    stop-on-hit-ground: false
    horiz-expand-radius: -0.5
    can-hit:
        - players
        - nonplayers
    spell: tdummy
    effects:
      - position: special
        effect: entity
        effect-interval: 1
        pitch: ~90
        entity:
          entity: text_display
          duration: 40
          interpolation-DELAY: 2
          background: ffffffff
          interpolation-duration: 50
          teleport-duration: 2
          billboard: fixed
          brightness:
            sky: 15
            block: 0
          text: " "
          transformation:
            left-rotation: "1,0,0,0.021"
            right-rotation: "0,0,0,1"
            scale: "6,3,6"
            translation: "0,0,0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                interpolation-delay: 0
                interpolation-duration: 40
                teleport-duration: 2
                background: 00ffffff
                transformation:
                  left-rotation: "1,0,0,0.021"
                  right-rotation: "0,0,0,1"
                  scale: "2,1,2"
                  translation: "0,0,0"
      - position: special
        effect: entity
        effect-interval: 1
        pitch: ~90
        entity:
          entity: text_display
          duration: 40
          interpolation-DELAY: 2
          background: ffffffff
          interpolation-duration: 50
          teleport-duration: 2
          billboard: fixed
          brightness:
            sky: 10
            block: 0
          text: " "
          transformation:
            left-rotation: "0,0,0,1"
            right-rotation: "0,0,0,1"
            scale: "6,3,6"
            translation: "0,0,0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                interpolation-delay: 0
                interpolation-duration: 40
                background: 00ffffff
                teleport-duration: 2
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0,0,1"
                  scale: "2,1,2"
                  translation: "0,0,0"`,
                notes: "An effect that creates a vacuum which pulls long gusts of wind inwards towards the center. The effect uses two layers of text displays to create a more dynamic visual as well as using the orbit spell class to allow for more natural movement and wall collisions if desired."}
    ];

    const list = document.getElementById("configList");
    const cards = document.getElementById("cards");
    let activeIndex = 0;

    function render() {
      list.innerHTML = "";
      cards.innerHTML = "";

      configurations.forEach((config, index) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.className = "config-button" + (index === activeIndex ? " active" : "");
        button.textContent = config.name;
        button.addEventListener("click", () => {
          activeIndex = index;
          render();
        });
        li.appendChild(button);
        list.appendChild(li);

        const article = document.createElement("article");
        article.className = "config-card" + (index === activeIndex ? " active" : "");
        article.innerHTML = `
          <div class="config-header"><h3>${config.name}</h3></div>
          <div class="content">
            <div class="panel">
              <h4>YAML Configuration</h4>
              <textarea readonly>${config.yaml}</textarea>
            </div>
            <div class="panel">
              <h4>Visual Preview</h4>
              <img class="preview" src="${config.image}" alt="${config.name} effect preview" />
            </div>
            <div class="panel">
              <h4>How It Works / Notes</h4>
              <p class="notes">${config.notes}</p>
            </div>
          </div>
          <div class="pager">
            <button ${index === 0 ? "disabled" : ""} data-direction="prev">Previous</button>
            <button ${index === configurations.length - 1 ? "disabled" : ""} data-direction="next">Next</button>
          </div>
        `;

        article.querySelectorAll(".pager button").forEach(btn => {
          btn.addEventListener("click", () => {
            if (btn.dataset.direction === "prev" && activeIndex > 0) activeIndex--;
            if (btn.dataset.direction === "next" && activeIndex < configurations.length - 1) activeIndex++;
            render();
          });
        });

        cards.appendChild(article);
      });
    }

    render();
  </script>
</body>
</html>
